      targetPort: 5400

---
# ---------- GATEWAY API ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-api
  namespace: festival
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-api
  template:
    metadata:
      labels:
        app: gateway-api
    spec:
      containers:
        - name: gateway-api
          image: tuusuario/festival-gateway-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: festival-config
            - secretRef:
                name: festival-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "200m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 10

---
# Service de tipo LoadBalancer: expone el Gateway al mundo exterior
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: festival
spec:
  type: LoadBalancer      # En cloud: asigna IP pública automáticamente
  selector:
    app: gateway-api
  ports:
    - port: 80
      targetPort: 8080

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: festival
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
