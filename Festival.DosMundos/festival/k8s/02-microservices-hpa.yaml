---
# ---------- ORDER API ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-api
  namespace: festival
spec:
  replicas: 3         # Más réplicas: es el servicio más demandado
  selector:
    matchLabels:
      app: order-api
  template:
    metadata:
      labels:
        app: order-api
    spec:
      containers:
        - name: order-api
          image: tuusuario/festival-order-api:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: festival-config
            - secretRef:
                name: festival-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: festival
spec:
  selector:
    app: order-api
  ports:
    - port: 5000
      targetPort: 5000

---
# HPA del Order: escala agresivamente en el minuto cero
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-hpa
  namespace: festival
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-api
  minReplicas: 3
  maxReplicas: 20     # Hasta 20 pods en pico de 50k usuarios
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50   # Más agresivo: escala antes de saturarse

