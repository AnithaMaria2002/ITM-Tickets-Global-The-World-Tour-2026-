# =============================================================================
# FESTIVAL DE LOS DOS MUNDOS - Kubernetes: Microservicios + HPA
# Horizontal Pod Autoscaler: escala automáticamente bajo carga
# =============================================================================

# ---------- INVENTORY API ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: festival
spec:
  replicas: 2         # Mínimo 2 réplicas para alta disponibilidad
  selector:
    matchLabels:
      app: inventory-api
  template:
    metadata:
      labels:
        app: inventory-api
    spec:
      containers:
        - name: inventory-api
          image: tuusuario/festival-inventory-api:latest  # Reemplaza con tu usuario de Docker Hub
          ports:
            - containerPort: 5100   # HTTP
            - containerPort: 5101   # gRPC
          envFrom:
            - configMapRef:
                name: festival-config
            - secretRef:
                name: festival-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:      # K8s mata el pod si no responde
            httpGet:
              path: /health
              port: 5100
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:     # K8s no manda tráfico hasta que esté listo
            httpGet:
              path: /health
              port: 5100
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: festival
spec:
  selector:
    app: inventory-api
  ports:
    - name: http
      port: 5100
      targetPort: 5100
    - name: grpc
      port: 5101
      targetPort: 5101

---
# HPA: Auto-escalado del Inventory basado en CPU
# En el minuto cero de venta: pasa de 2 a 10 pods automáticamente
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inventory-hpa
  namespace: festival
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inventory-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60   # Escala cuando CPU supera el 60%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70

---
