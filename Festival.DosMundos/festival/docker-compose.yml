version: '3.9'

# =============================================================================
# FESTIVAL DE LOS DOS MUNDOS - Docker Compose
# Levanta todo el ecosistema con un solo: docker-compose up --build
#
# Orden de arranque:
# 1. Infraestructura: RabbitMQ, Redis, Elasticsearch, Qdrant
# 2. Microservicios: Inventory, Price, Ticket, Order, Search
# 3. Gateway: Punto único de entrada
# =============================================================================

networks:
  festival-net:
    driver: bridge  # Red interna donde todos los servicios se hablan por nombre

volumes:
  rabbitmq_data:
  redis_data:
  elasticsearch_data:
  qdrant_data:

services:

  # ===========================================================================
  # INFRAESTRUCTURA BASE (Servicios de los que dependen los microservicios)
  # ===========================================================================

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: festival-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"   # AMQP (para los microservicios)
      - "15672:15672" # Panel de administración web (usuario: guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - festival-net
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: festival-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - festival-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: festival-elasticsearch
    environment:
      - discovery.type=single-node          # Nodo único (no cluster) para desarrollo
      - xpack.security.enabled=false         # Sin TLS para simplificar en clase
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"   # Límite de RAM
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - festival-net
    healthcheck:
      test: curl -s http://localhost:9200/_cluster/health | grep -q '"status":"green\|yellow"'
      interval: 20s
      timeout: 10s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: festival-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - festival-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # MICROSERVICIOS DE NEGOCIO
  # ===========================================================================

  inventory-api:
    build:
      context: .
      dockerfile: Festival.Inventory.Api/Dockerfile
    container_name: festival-inventory
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - JwtSettings__Issuer=FestivalIdentityServer
      - JwtSettings__Audience=FestivalApis
      - JwtSettings__SecretKey=Festival-Dos-Mundos-Super-Secret-Key-2026-ITM-Nivel5
    ports:
      - "5100:5100"  # HTTP/REST
      - "5101:5101"  # gRPC
    networks:
      - festival-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  price-api:
    build:
      context: .
      dockerfile: Festival.Price.Api/Dockerfile
    container_name: festival-price
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - JwtSettings__Issuer=FestivalIdentityServer
      - JwtSettings__Audience=FestivalApis
      - JwtSettings__SecretKey=Festival-Dos-Mundos-Super-Secret-Key-2026-ITM-Nivel5
      - ConnectionStrings__Redis=redis:6379   # Nombre del servicio de Docker como hostname
    ports:
      - "5200:5200"
    networks:
      - festival-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5200/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  ticket-api:
    build:
      context: .
      dockerfile: Festival.Ticket.Api/Dockerfile
    container_name: festival-ticket
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - RabbitMQ__Host=rabbitmq             # Nombre del servicio de Docker como hostname
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    ports:
      - "5300:5300"
    networks:
      - festival-net
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5300/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  order-api:
    build:
      context: .
      dockerfile: Festival.Order.Api/Dockerfile
    container_name: festival-order
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - JwtSettings__Issuer=FestivalIdentityServer
      - JwtSettings__Audience=FestivalApis
      - JwtSettings__SecretKey=Festival-Dos-Mundos-Super-Secret-Key-2026-ITM-Nivel5
      - GrpcEndpoints__Inventory=http://inventory-api:5101  # gRPC al Inventory
      - HttpEndpoints__Price=http://price-api:5200
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    ports:
      - "5000:5000"
    networks:
      - festival-net
    depends_on:
      inventory-api:
        condition: service_healthy
      price-api:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  search-api:
    build:
      context: .
      dockerfile: Festival.Search.Api/Dockerfile
    container_name: festival-search
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - JwtSettings__Issuer=FestivalIdentityServer
      - JwtSettings__Audience=FestivalApis
      - JwtSettings__SecretKey=Festival-Dos-Mundos-Super-Secret-Key-2026-ITM-Nivel5
      - Elasticsearch__Url=http://elasticsearch:9200
      - Qdrant__Url=http://qdrant:6333
    ports:
      - "5400:5400"
    networks:
      - festival-net
    depends_on:
      elasticsearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5400/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # API GATEWAY: El único punto de entrada público
  # ===========================================================================

  gateway-api:
    build:
      context: .
      dockerfile: Festival.Gateway.Api/Dockerfile
    container_name: festival-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - JwtSettings__Issuer=FestivalIdentityServer
      - JwtSettings__Audience=FestivalApis
      - JwtSettings__SecretKey=Festival-Dos-Mundos-Super-Secret-Key-2026-ITM-Nivel5
    ports:
      - "8080:8080"    # Puerto público: el MAUI apunta aquí
    networks:
      - festival-net
    depends_on:
      order-api:
        condition: service_healthy
      inventory-api:
        condition: service_healthy
      price-api:
        condition: service_healthy
      ticket-api:
        condition: service_healthy
      search-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
