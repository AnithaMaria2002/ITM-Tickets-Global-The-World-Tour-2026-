# ---------- SEARCH API ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-api
  namespace: festival
spec:
  replicas: 2
  selector:
    matchLabels:
      app: search-api
  template:
    metadata:
      labels:
        app: search-api
    spec:
      containers:
        - name: search-api
          image: tuusuario/festival-search-api:latest
          ports:
            - containerPort: 5400
          envFrom:
            - configMapRef:
                name: festival-config
            - secretRef:
                name: festival-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
